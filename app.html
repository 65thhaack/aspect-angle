<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aspect Angle — Cockpit View</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050a0f;
    color: #00ff88;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
    letter-spacing: 0.3em;
    color: #00ff88;
    text-transform: uppercase;
    margin-bottom: 4px;
    text-shadow: 0 0 20px #00ff8888;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #00ff88aa;
    letter-spacing: 0.2em;
    margin-bottom: 16px;
  }

  .slider-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
    width: 100%;
    max-width: 1400px;
  }

  .angle-display {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.8rem;
    font-weight: 900;
    color: #00ff88;
    text-shadow: 0 0 30px #00ff88cc;
    letter-spacing: 0.05em;
  }

  .angle-label {
    font-size: 0.85rem;
    color: #00ff88cc;
    letter-spacing: 0.15em;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: min(700px, 90vw);
    height: 4px;
    background: linear-gradient(to right, #00ff88 var(--pct, 0%), #1a3a2a var(--pct, 0%));
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 12px #00ff88cc;
    cursor: pointer;
  }

  input[type=range].blue-slider {
    background: linear-gradient(to right, #44aaff var(--pct, 50%), #0a1a2a var(--pct, 50%));
  }

  input[type=range].blue-slider::-webkit-slider-thumb {
    background: #44aaff;
    box-shadow: 0 0 12px #44aaffcc;
  }

  .tick-row {
    display: flex;
    justify-content: space-between;
    width: min(700px, 90vw);
    font-size: 0.75rem;
    color: #00ff88aa;
    letter-spacing: 0.1em;
  }

  /* HUD Frame */
  .hud-wrapper {
    position: relative;
    width: 100%;
  }

  .views-row {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 1400px;
    align-items: stretch;
  }

  .view-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .view-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: #00ff88bb;
    text-align: center;
  }

  canvas { width: 100%; aspect-ratio: 1/1; display: block; border: 1px solid #00ff8844; border-radius: 4px; background: #000d06; }
  #topCanvas { background: #00050a; max-height: 480px; }

  .info-box {
    margin-top: 12px;
    width: 100%;
    max-width: 1400px;
    border: 1px solid #00ff8840;
    padding: 12px 18px;
    border-radius: 4px;
    background: #001a0a;
    font-size: 0.9rem;
    line-height: 1.7;
    color: #00ee77;
    min-height: 44px;
  }

  .side-indicator {
    display: flex;
    gap: 16px;
    margin-top: 12px;
    justify-content: center;
  }

  .side-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    padding: 6px 18px;
    border: 1px solid #00ff8840;
    background: transparent;
    color: #00ff8888;
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 2px;
  }

  .side-btn.active {
    background: #00ff8818;
    border-color: #00ff88;
    color: #00ff88;
    box-shadow: 0 0 10px #00ff8844;
  }

  .info-box .label {
    color: #00ff88;
    font-weight: bold;
  }

  .corner-deco {
    position: absolute;
    width: 14px;
    height: 14px;
    border-color: #00ff8866;
    border-style: solid;
  }
  .corner-deco.tl { top: 0; left: 0; border-width: 1px 0 0 1px; }
  .corner-deco.tr { top: 0; right: 0; border-width: 1px 1px 0 0; }
  .corner-deco.bl { bottom: 0; left: 0; border-width: 0 0 1px 1px; }
  .corner-deco.br { bottom: 0; right: 0; border-width: 0 1px 1px 0; }
</style>
</head>
<body>

<h1>Aspect Angle</h1>
<div class="subtitle">COCKPIT PERSPECTIVE — BANDIT AT 6000 FT</div>

<div class="slider-section" style="margin-bottom:6px;">
  <div style="display:flex; align-items:center; gap:20px;">
    <div style="text-align:center;">
      <div class="angle-display" id="angleDisplay">0R</div>
      <div class="angle-label">ASPECT ANGLE</div>
    </div>
  </div>
</div>

<!-- 3-column layout: left=bandit col, center=top-down, right=ownship col -->
<div style="display:flex; gap:12px; width:100%; max-width:1400px; align-items:flex-start;">

  <!-- LEFT COLUMN: Bandit heading dial + cockpit canvas + pitch -->
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px; width:220px; flex-shrink:0;">
    <div class="angle-label" style="color:#00ff88cc;">BANDIT HEADING</div>
    <canvas id="banditDial" width="110" height="110" style="cursor:pointer; width:110px; height:110px; border:none; background:transparent; aspect-ratio:unset;"></canvas>
    <div id="headingDisplay" style="font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:900;color:#00ff88;text-shadow:0 0 20px #00ff88cc;">180°</div>
    <div class="view-label" style="margin-top:4px;">COCKPIT VIEW</div>
    <div class="hud-wrapper" style="width:100%;">
      <div class="corner-deco tl"></div>
      <div class="corner-deco tr"></div>
      <div class="corner-deco bl"></div>
      <div class="corner-deco br"></div>
      <canvas id="hudCanvas"></canvas>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px; margin-top:4px; width:100%;">
      <div style="display:flex; align-items:center; gap:8px;">
        <span class="angle-label">PITCH</span>
        <span id="pitchDisplay" style="font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;color:#00ff88;text-shadow:0 0 20px #00ff88cc;">0°</span>
      </div>
      <input type="range" id="pitchSlider" min="-60" max="60" value="0" step="1" style="width:100%;">
      <div style="display:flex; justify-content:space-between; width:100%; font-size:0.75rem; color:#00ff88aa; letter-spacing:0.06em;">
        <span>-60°</span><span>LEVEL</span><span>+60°</span>
      </div>
    </div>
  </div>

  <!-- CENTER COLUMN: Top-down canvas with position sliders -->
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px; flex:1; min-width:0;">
    <div class="view-label">TOP-DOWN VIEW</div>

    <!-- Bandit horizontal position — top -->
    <div style="display:flex; align-items:center; gap:8px; width:100%; padding:0 26px;">
      <span style="font-family:'Share Tech Mono',monospace; font-size:0.85rem; color:#00ff88cc; white-space:nowrap;">◀ BANDIT ▶</span>
      <input type="range" id="banditPosSlider" min="-300" max="300" value="0" step="1"
        style="flex:1; accent-color:#00ff88;">
    </div>

    <!-- Canvas row with vertical Y sliders -->
    <div style="display:flex; align-items:stretch; gap:4px; width:100%;">

      <!-- Bandit Y slider (left, green) -->
      <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;">
        <span style="font-size:0.8rem; color:#00ff88cc;">▲</span>
        <input type="range" id="banditYSlider" min="-100" max="100" value="0" step="1"
          style="writing-mode:vertical-lr; -webkit-appearance:slider-vertical; width:18px; height:160px; cursor:pointer; background:transparent; outline:none; accent-color:#00ff88;">
        <span style="font-size:0.8rem; color:#00ff88cc;">▼</span>
      </div>

      <div class="hud-wrapper" style="flex:1;">
        <div class="corner-deco tl"></div>
        <div class="corner-deco tr"></div>
        <div class="corner-deco bl"></div>
        <div class="corner-deco br"></div>
        <canvas id="topCanvas"></canvas>
      </div>

      <!-- My Y slider (right, blue) -->
      <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;">
        <span style="font-size:0.8rem; color:#44aaffcc;">▲</span>
        <input type="range" id="myYSlider" min="-100" max="100" value="0" step="1"
          style="writing-mode:vertical-lr; -webkit-appearance:slider-vertical; width:18px; height:160px; cursor:pointer; background:transparent; outline:none; accent-color:#44aaff;">
        <span style="font-size:0.8rem; color:#44aaffcc;">▼</span>
      </div>

    </div>

    <!-- My horizontal position — bottom -->
    <div style="display:flex; align-items:center; gap:8px; width:100%; padding:0 26px;">
      <span style="font-family:'Share Tech Mono',monospace; font-size:0.85rem; color:#44aaffcc; white-space:nowrap;">◀ OWNSHIP ▶</span>
      <input type="range" id="myPosSlider" min="-300" max="300" value="0" step="1"
        class="blue-slider" style="flex:1;">
    </div>
  </div>

  <!-- RIGHT COLUMN: Ownship heading dial only -->
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px; width:220px; flex-shrink:0;">
    <div class="angle-label" style="color:#44aaffcc;">MY HEADING</div>
    <canvas id="myDial" width="110" height="110" style="cursor:pointer; width:110px; height:110px; border:none; background:transparent; aspect-ratio:unset;"></canvas>
    <div id="myHeadingDisplay" style="font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:900;color:#44aaff;text-shadow:0 0 20px #44aaffcc;">0°</div>
  </div>

</div>

<div class="info-box" id="infoBox"></div>

<script>
const canvas = document.getElementById('hudCanvas');
const ctx = canvas.getContext('2d');
const topCanvas = document.getElementById('topCanvas');
const tctx = topCanvas.getContext('2d');
const slider = document.getElementById('slider');
const angleDisplay = document.getElementById('angleDisplay');
const infoBox = document.getElementById('infoBox');

let banditHeading = 180;
let banditPos = 0;
let banditYPos = 0;     // bandit vertical offset -100 to +100
let myPos = 0;
let myYPos = 0;         // ownship vertical offset -100 to +100
let myHeading = 0;
let currentPitch = 0;
let currentAngle = 0;
let side = 'L';

function computeAA() {
  // Real positions in normalized canvas space.
  // Bandit is at top (Y=0.22), ownship at bottom (Y=0.82).
  // Horizontal positions driven by sliders.
  const banX =  banditPos / 300 * 0.88;
  const banY = -0.60 + (banditYPos / 100) * 0.35;  // default top, slider moves it down
  const myX  =  myPos   / 300 * 0.88;
  const myY  =  0.0    + (myYPos   / 100) * 0.35;  // default bottom, slider moves it up

  // LOS vector from bandit to ownship
  const losDX = myX - banX;
  const losDY = myY - banY;  // positive = ownship is below

  // Tail vector: opposite of nose direction.
  // Heading 0=north: nose=(sin0, -cos0)=(0,-1) on canvas, tail=(0,+1)
  // Heading 180: nose points south=(0,+1), tail points north=(0,-1)
  const headRad = banditHeading * Math.PI / 180;
  const tailVX  = -Math.sin(headRad);
  const tailVY  =  Math.cos(headRad);

  // Cross product — canvas Y is flipped so we don't negate
  const cross = tailVX * losDY - tailVY * losDX;
  const dot   = tailVX * losDX + tailVY * losDY;
  let deg = Math.round(Math.atan2(cross, dot) * 180 / Math.PI);

  side = deg >= 0 ? 'R' : 'L';
  currentAngle = Math.abs(deg);

  document.getElementById('angleDisplay').textContent = fmt(currentAngle) + side;
}

function setSide(s) {
  // kept for compatibility but no longer used by buttons
}

// Display convention: divide by 10, drop trailing zero. 150→15, 40→4, 90→9
function fmt(angle) {
  const v = Math.round(angle / 10);
  return v === 0 ? '0' : String(v);
}

// ── COMPASS DIALS ──────────────────────────────────────────────────────────
function drawDial(canvasEl, heading, color) {
  const dc = canvasEl.getContext('2d');
  const W = canvasEl.width;
  const H = canvasEl.height;
  const cx = W / 2, cy = H / 2;
  const R = W / 2 - 4;

  dc.clearRect(0, 0, W, H);

  // Background
  dc.beginPath();
  dc.arc(cx, cy, R, 0, Math.PI * 2);
  dc.fillStyle = '#00050a';
  dc.fill();

  // Outer ring
  dc.beginPath();
  dc.arc(cx, cy, R, 0, Math.PI * 2);
  dc.strokeStyle = color + '44';
  dc.lineWidth = 1.5;
  dc.stroke();

  // Tick marks
  for (let deg = 0; deg < 360; deg += 10) {
    const rad = (deg - 90) * Math.PI / 180;
    const isMajor = deg % 90 === 0;
    const isMid   = deg % 45 === 0;
    const inner = R - (isMajor ? 14 : isMid ? 10 : 6);
    dc.beginPath();
    dc.moveTo(cx + Math.cos(rad) * inner, cy + Math.sin(rad) * inner);
    dc.lineTo(cx + Math.cos(rad) * (R - 2), cy + Math.sin(rad) * (R - 2));
    dc.strokeStyle = isMajor ? color + 'cc' : color + '44';
    dc.lineWidth = isMajor ? 1.5 : 0.8;
    dc.stroke();
  }

  // Cardinal letters
  const cardinals = [['N', 0], ['E', 90], ['S', 180], ['W', 270]];
  dc.font = `bold 13px "Share Tech Mono"`;
  dc.textAlign = 'center';
  dc.textBaseline = 'middle';
  cardinals.forEach(([ltr, deg]) => {
    const rad = (deg - 90) * Math.PI / 180;
    const r = R - 22;
    dc.fillStyle = ltr === 'N' ? color : color + '99';
    dc.fillText(ltr, cx + Math.cos(rad) * r, cy + Math.sin(rad) * r);
  });

  // Needle
  const needleRad = (heading - 90) * Math.PI / 180;
  dc.beginPath();
  dc.moveTo(cx, cy);
  dc.lineTo(cx + Math.cos(needleRad) * (R - 18), cy + Math.sin(needleRad) * (R - 18));
  dc.strokeStyle = color;
  dc.lineWidth = 2.5;
  dc.lineCap = 'round';
  dc.stroke();

  // Center dot
  dc.beginPath();
  dc.arc(cx, cy, 3, 0, Math.PI * 2);
  dc.fillStyle = color;
  dc.fill();
}

function makeDial(canvasEl, getVal, setVal, displayEl, color, affectsAA) {
  let dragging = false;
  let lastAngle = null;

  function angleFromEvent(e) {
    const rect = canvasEl.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const dx = clientX - (rect.left + rect.width / 2);
    const dy = clientY - (rect.top  + rect.height / 2);
    return Math.atan2(dy, dx) * 180 / Math.PI + 90;
  }

  function onStart(e) { dragging = true; lastAngle = angleFromEvent(e); e.preventDefault(); }

  function onMove(e) {
    if (!dragging) return;
    const angle = angleFromEvent(e);
    let delta = angle - lastAngle;
    if (delta > 180)  delta -= 360;
    if (delta < -180) delta += 360;
    lastAngle = angle;
    const newVal = ((getVal() + delta) % 360 + 360) % 360;
    setVal(Math.round(newVal));
    displayEl.textContent = Math.round(getVal()) + '°';
    drawDial(canvasEl, getVal(), color);
    if (affectsAA) computeAA();
    draw();
    e.preventDefault();
  }

  function onEnd() { dragging = false; lastAngle = null; }

  canvasEl.addEventListener('mousedown',  onStart);
  canvasEl.addEventListener('touchstart', onStart, { passive: false });
  window.addEventListener('mousemove',  onMove);
  window.addEventListener('touchmove',  onMove, { passive: false });
  window.addEventListener('mouseup',    onEnd);
  window.addEventListener('touchend',   onEnd);
}

const myPosSlider = document.getElementById('myPosSlider');
myPosSlider.addEventListener('input', () => {
  myPos = parseInt(myPosSlider.value);
  myPosSlider.style.setProperty('--pct', ((myPos + 300) / 600 * 100).toFixed(1) + '%');
  computeAA();
  draw();
});

const banditYSlider = document.getElementById('banditYSlider');
banditYSlider.addEventListener('input', () => {
  banditYPos = parseInt(banditYSlider.value);
  computeAA();
  draw();
});

const myYSlider = document.getElementById('myYSlider');
myYSlider.addEventListener('input', () => {
  myYPos = parseInt(myYSlider.value);
  computeAA();
  draw();
});
banditPosSlider.addEventListener('input', () => {
  banditPos = parseInt(banditPosSlider.value);
  banditPosSlider.style.setProperty('--pct', ((banditPos + 300) / 600 * 100).toFixed(1) + '%');
  computeAA();
  draw();
});
const pitchDisplay = document.getElementById('pitchDisplay');
pitchSlider.addEventListener('input', () => {
  currentPitch = parseInt(pitchSlider.value);
  pitchDisplay.textContent = (currentPitch >= 0 ? '+' : '') + currentPitch + '°';
  const pct = ((currentPitch + 60) / 120 * 100).toFixed(1) + '%';
  pitchSlider.style.setProperty('--pct', pct);
  draw();
});

function resizeTopCanvas() {
  const w = topCanvas.offsetWidth;
  const h = topCanvas.offsetHeight;
  topCanvas.width  = w * window.devicePixelRatio;
  topCanvas.height = h * window.devicePixelRatio;
  tctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}

// Flat 2D top-down plan view.
// Ownship: bottom-center, pointing straight up. Fixed.
// Bandit:  upper-center, fixed position. Rotates based on aspect angle.
// 0° AA: bandit nose points away (up). 90° AA: bandit sideways. 180° AA: head-on.
function drawTopDown(angle, side, myPos) {
  const W = topCanvas.width  / window.devicePixelRatio;
  const H = topCanvas.height / window.devicePixelRatio;

  tctx.clearRect(0, 0, W, H);
  tctx.fillStyle = '#00050a';
  tctx.fillRect(0, 0, W, H);

  // Subtle grid
  tctx.strokeStyle = '#00ff8808';
  tctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { tctx.beginPath(); tctx.moveTo(x,0); tctx.lineTo(x,H); tctx.stroke(); }
  for (let y = 0; y < H; y += 40) { tctx.beginPath(); tctx.moveTo(0,y); tctx.lineTo(W,y); tctx.stroke(); }

  const sideSign = side === 'R' ? 1 : -1;
  const rad = currentAngle * Math.PI / 180;
  const sc = Math.min(W, H) * 0.10;

  const myCX  = W * 0.50 + (myPos     / 300) * W * 0.44;
  const myCY  = H * 0.82 - (myYPos    / 100) * H * 0.30;
  const banCX = W * 0.50 + (banditPos / 300) * W * 0.44;
  const banCY = H * 0.22 + (banditYPos / 100) * H * 0.30;

  // Bandit rotation is driven purely by banditHeading slider
  const banditRot = banditHeading * Math.PI / 180;

  // ── Helper: draw flat top-down jet. Nose points UP in local coords. ──
  function drawJet(color, fill) {
    tctx.beginPath();
    tctx.moveTo(0, -sc * 0.55);
    tctx.lineTo( sc * 0.10, -sc * 0.20);
    tctx.lineTo( sc * 0.10,  sc * 0.42);
    tctx.lineTo(-sc * 0.10,  sc * 0.42);
    tctx.lineTo(-sc * 0.10, -sc * 0.20);
    tctx.closePath();
    tctx.fillStyle = fill; tctx.fill();
    tctx.strokeStyle = color; tctx.lineWidth = 1.8; tctx.stroke();

    // Left wing
    tctx.beginPath();
    tctx.moveTo(-sc * 0.10,  sc * 0.05);
    tctx.lineTo(-sc * 0.68,  sc * 0.26);
    tctx.lineTo(-sc * 0.10,  sc * 0.36);
    tctx.closePath();
    tctx.fillStyle = fill; tctx.fill();
    tctx.strokeStyle = color; tctx.lineWidth = 1.8; tctx.stroke();

    // Right wing
    tctx.beginPath();
    tctx.moveTo( sc * 0.10,  sc * 0.05);
    tctx.lineTo( sc * 0.68,  sc * 0.26);
    tctx.lineTo( sc * 0.10,  sc * 0.36);
    tctx.closePath();
    tctx.fillStyle = fill; tctx.fill();
    tctx.strokeStyle = color; tctx.lineWidth = 1.8; tctx.stroke();
  }

  const extLen = sc * 3.0;
  const arrowSize = 8;

  // ── OWNSHIP — rotates by myHeading ──
  tctx.save();
  tctx.translate(myCX, myCY);
  tctx.rotate(myHeading * Math.PI / 180);
  drawJet('#44aaff', '#001a2a');
  tctx.restore();

  tctx.font = '12px "Share Tech Mono"';
  tctx.fillStyle = '#44aaff88';
  tctx.textAlign = 'center';
  tctx.fillText('OWNSHIP', myCX, myCY + sc * 0.72);

  // ── BLUE DASHED HEADING LINE for ownship ──
  const myRot = myHeading * Math.PI / 180;
  const myNoseVX =  Math.sin(myRot);
  const myNoseVY = -Math.cos(myRot);
  const myTailVX = -myNoseVX;
  const myTailVY = -myNoseVY;

  tctx.beginPath();
  tctx.moveTo(myCX + myTailVX * extLen, myCY + myTailVY * extLen);
  tctx.lineTo(myCX + myNoseVX * extLen, myCY + myNoseVY * extLen);
  tctx.strokeStyle = '#4488ffcc';
  tctx.lineWidth = 2;
  tctx.setLineDash([8, 5]);
  tctx.stroke();
  tctx.setLineDash([]);

  // Arrowhead at ownship nose
  const myArrowAngle = Math.atan2(myNoseVY, myNoseVX);
  const myArrowTipX = myCX + myNoseVX * extLen;
  const myArrowTipY = myCY + myNoseVY * extLen;
  tctx.beginPath();
  tctx.moveTo(myArrowTipX, myArrowTipY);
  tctx.lineTo(myArrowTipX - arrowSize * Math.cos(myArrowAngle - 0.4), myArrowTipY - arrowSize * Math.sin(myArrowAngle - 0.4));
  tctx.lineTo(myArrowTipX - arrowSize * Math.cos(myArrowAngle + 0.4), myArrowTipY - arrowSize * Math.sin(myArrowAngle + 0.4));
  tctx.closePath();
  tctx.fillStyle = '#4488ffcc';
  tctx.fill();

  // ── RED DASHED LINE — bandit heading vector ──
  const noseVX =  Math.sin(banditRot);
  const noseVY = -Math.cos(banditRot);
  const tailVX = -noseVX;
  const tailVY = -noseVY;

  tctx.beginPath();
  tctx.moveTo(banCX + tailVX * extLen, banCY + tailVY * extLen);
  tctx.lineTo(banCX + noseVX * extLen, banCY + noseVY * extLen);
  tctx.strokeStyle = '#ff3333cc';
  tctx.lineWidth = 2;
  tctx.setLineDash([8, 5]);
  tctx.stroke();
  tctx.setLineDash([]);

  // Arrowhead at nose end
  const arrowAngle = Math.atan2(noseVY, noseVX);
  const arrowTipX = banCX + noseVX * extLen;
  const arrowTipY = banCY + noseVY * extLen;
  tctx.beginPath();
  tctx.moveTo(arrowTipX, arrowTipY);
  tctx.lineTo(arrowTipX - arrowSize * Math.cos(arrowAngle - 0.4), arrowTipY - arrowSize * Math.sin(arrowAngle - 0.4));
  tctx.lineTo(arrowTipX - arrowSize * Math.cos(arrowAngle + 0.4), arrowTipY - arrowSize * Math.sin(arrowAngle + 0.4));
  tctx.closePath();
  tctx.fillStyle = '#ff3333cc';
  tctx.fill();

  // ── BANDIT — rotates in place ──
  tctx.save();
  tctx.translate(banCX, banCY);
  tctx.rotate(banditRot);
  drawJet('#00ff88', '#001f0e');
  tctx.restore();

  tctx.font = '12px "Share Tech Mono"';
  tctx.fillStyle = '#00ff8888';
  tctx.textAlign = 'center';
  tctx.fillText('BANDIT', banCX, banCY - sc * 0.82);

  // ── BLUE DASHED LOS LINE — center to center ──
  const losStartX = myCX;
  const losStartY = myCY;
  const losEndX   = banCX;
  const losEndY   = banCY;

  tctx.beginPath();
  tctx.moveTo(losStartX, losStartY);
  tctx.lineTo(losEndX, losEndY);
  tctx.strokeStyle = '#4488ffbb';
  tctx.lineWidth = 1.8;
  tctx.setLineDash([8, 5]);
  tctx.stroke();
  tctx.setLineDash([]);

  // ── AA LABEL — single source of truth from computeAA() ──
  const losDX = losStartX - banCX;
  const losDY = losStartY - banCY;
  const losLen      = Math.sqrt(losDX * losDX + losDY * losDY) || 1;
  const tailAngle   = Math.atan2(tailVY, tailVX);
  const losFromBandit = Math.atan2(losDY, losDX);

  const losMidX = (losStartX + losEndX) / 2;
  const losMidY = (losStartY + losEndY) / 2;
  const perpX   = -losDY / losLen;
  const perpY   =  losDX / losLen;
  const labelSign  = side === 'R' ? 1 : -1;
  const labelOffset = 16;
  const labelX = losMidX + labelSign * perpX * labelOffset;
  const labelY = losMidY + labelSign * perpY * labelOffset;

  tctx.font = 'bold 15px "Share Tech Mono"';
  tctx.textAlign = labelSign > 0 ? 'left' : 'right';

  // Radar (green) label
  tctx.fillStyle = '#00ff88';
  tctx.fillText(`${fmt(currentAngle)}${side}`, labelX, labelY);

  tctx.textAlign = 'left';

  // ── ARC — from tail-line to LOS ──
  const arcR = sc * 1.9;
  const ccw  = side === 'L';

  tctx.beginPath();
  tctx.moveTo(banCX, banCY);
  tctx.arc(banCX, banCY, arcR, tailAngle, losFromBandit, ccw);
  tctx.closePath();
  tctx.fillStyle = 'rgba(68,136,255,0.07)';
  tctx.fill();

  tctx.beginPath();
  tctx.arc(banCX, banCY, arcR, tailAngle, losFromBandit, ccw);
  tctx.strokeStyle = '#4488ffaa';
  tctx.lineWidth = 2;
  tctx.stroke();
}

function resizeCanvas() {
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;
  canvas.width = w * window.devicePixelRatio;
  canvas.height = h * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  resizeTopCanvas();
  draw();
}

// Draw a clean fighter silhouette from cockpit perspective
// angle: 0 = dead 6 (tailpipe), 90 = pure beam, 180 = head-on
// side: 'L' or 'R'
//
// APPROACH: Think of the jet as a 3D object rotated around its vertical axis.
// We project 3D points onto the 2D canvas using simple orthographic projection
// with perspective foreshortening on the depth (fore-aft) axis.
//
// Jet local coords: X = lateral (right wing positive), Y = vertical (up positive),
// Z = longitudinal (nose positive, tail negative). Origin = center of aircraft.
//
// aspect 0°  → we look along +Z axis (from behind, see tail)
// aspect 90° → we look along +X or -X axis (beam view)
// aspect 180°→ we look along -Z axis (head-on, see nose)
//
// Rotation: bandit yaws by `angle` degrees relative to us.
// For side='L', bandit's left side faces us as angle grows.
// For side='R', bandit's right side faces us.

function drawBandit(cx, cy, angle, side, scale, pitch) {
  const GREEN = '#00ff88';
  const FILL  = '#001f0e';
  const LINE  = 2.0;

  const rad = angle * Math.PI / 180;
  const pitchRad = (pitch || 0) * Math.PI / 180;
  const sideSign = side === 'L' ? 1 : -1;

  const cosA = Math.cos(rad);
  const sinA = Math.sin(rad);
  const cosP = Math.cos(pitchRad);
  const sinP = Math.sin(pitchRad);

  // Project a 3D jet-local point [lx, ly, lz] to canvas [px, py]
  // First apply yaw (around Y axis), then pitch (around X axis)
  function proj(lx, ly, lz) {
    // Yaw: rotate around Y
    const yx = lx * cosA + lz * sinA * sideSign;
    const yy = ly;
    const yz = -lx * sinA * sideSign + lz * cosA;
    // Pitch: rotate around X (nose up = positive pitch)
    const px = yx;
    const py = yy * cosP - yz * sinP;
    // py is the vertical component on canvas
    return [cx + px * scale, cy - py * scale];
  }

  ctx.save();
  ctx.lineJoin = 'round';
  ctx.lineCap  = 'round';

  // ── FUSELAGE ──────────────────────────────────────────────────────────────
  // A simple tapered tube: nose at lz=+0.55, tail at lz=-0.55
  // Width (lx) is narrow: ±0.07. We draw it as a filled quadrilateral
  // by projecting the four corners of the fuselage cross-section silhouette.
  //
  // Because we're looking from behind, we draw the fuselage as
  // a shape whose projected width is bodyHalfW * cosA (foreshortens to 0 at 90°)
  // and whose projected length is fuseLen * sinA (grows to full at 90°).

  const fuseLen  = 0.55;  // half-length in jet units
  const bodyW    = 0.07;  // half-width

  // Four corners of fuselage (top-down silhouette, then vertically:
  // We'll draw a side-elevation quad: nose-top, nose-bot, tail-bot, tail-top
  const noseTip = proj(0,  0.04,  fuseLen);   // nose tip (slightly above center)
  const noseBot = proj(0, -0.05,  fuseLen);
  const tailTop = proj(0,  0.06, -fuseLen);
  const tailBot = proj(0, -0.04, -fuseLen);

  // Lateral extent of fuselage (for the left/right edges)
  const fuseRtop = proj( bodyW,  0.04, 0);
  const fuseRbot = proj( bodyW, -0.04, 0);
  const fuseLtop = proj(-bodyW,  0.04, 0);
  const fuseLbot = proj(-bodyW, -0.04, 0);

  // Build a clean fuselage outline by projecting a simple box:
  // top edge: nose→tail along top, bottom edge: tail→nose along bottom
  const [ntx, nty] = proj(0,  0.07,  fuseLen * 0.9);
  const [nbx, nby] = proj(0, -0.06,  fuseLen * 0.9);
  const [ttx, tty] = proj(0,  0.05, -fuseLen);
  const [tbx, tby] = proj(0, -0.04, -fuseLen);

  // For the lateral spread of the fuselage silhouette (visible width)
  // At 0° (end-on) width = bodyW projected = very thin
  // At 90° (beam) width = 0 laterally, full length visible
  const projBodyW = bodyW * cosA;  // how wide the body appears laterally

  // Left & right side projected
  const [rTopNx, rTopNy] = proj( bodyW,  0.07,  fuseLen * 0.85);
  const [rBotNx, rBotNy] = proj( bodyW, -0.06,  fuseLen * 0.85);
  const [rTopTx, rTopTy] = proj( bodyW,  0.05, -fuseLen);
  const [rBotTx, rBotTy] = proj( bodyW, -0.04, -fuseLen);
  const [lTopNx, lTopNy] = proj(-bodyW,  0.07,  fuseLen * 0.85);
  const [lBotNx, lBotNy] = proj(-bodyW, -0.06,  fuseLen * 0.85);
  const [lTopTx, lTopTy] = proj(-bodyW,  0.05, -fuseLen);
  const [lBotTx, lBotTy] = proj(-bodyW, -0.04, -fuseLen);

  // Draw fuselage as filled shape — use convex hull of projected corners
  ctx.beginPath();
  ctx.moveTo(rTopNx, rTopNy);
  ctx.lineTo(lTopNx, lTopNy);
  ctx.lineTo(lTopTx, lTopTy);
  ctx.lineTo(lBotTx, lBotTy);
  ctx.lineTo(rBotTx, rBotTy);
  ctx.lineTo(rBotNx, rBotNy);
  ctx.closePath();
  ctx.fillStyle = FILL;
  ctx.fill();
  ctx.strokeStyle = GREEN;
  ctx.lineWidth = LINE;
  ctx.stroke();

  // ── WINGS ─────────────────────────────────────────────────────────────────
  // Swept delta wings. Root at lz=0.05, tip at lz=-0.35.
  // Span: ±0.85 at tip, ±0.08 at root (leading edge sweep).
  // Trailing edge: straight across at lz=-0.35.
  //
  // Wing is a triangle:
  //   root-leading  (lx=±0.08, lz= 0.10)
  //   root-trailing (lx=±0.08, lz=-0.35)
  //   tip           (lx=±0.85, lz=-0.30)

  function drawWing(xSign) {
    const [rlx, rly] = proj(xSign * 0.09,  0, 0.10);  // root leading
    const [rtx, rty] = proj(xSign * 0.09,  0, -0.35); // root trailing
    const [tx,  ty ] = proj(xSign * 0.85,  0, -0.28); // tip
    ctx.beginPath();
    ctx.moveTo(rlx, rly);
    ctx.lineTo(tx,  ty);
    ctx.lineTo(rtx, rty);
    ctx.closePath();
    ctx.fillStyle = FILL;
    ctx.fill();
    ctx.strokeStyle = GREEN;
    ctx.lineWidth = LINE;
    ctx.stroke();
  }

  drawWing(-1);  // left wing
  drawWing( 1);  // right wing

  // ── SINGLE VERTICAL TAIL FIN ──────────────────────────────────────────────
  // Mounted on centerline (lx=0), rises upward from the tail section.
  // Root: lz = -0.25 to -0.55 at ly=0.05
  // Tip:  lz = -0.30,          at ly=0.45
  // Simple triangle.
  const [finRootFx, finRootFy] = proj(0,  0.05, -0.25);  // root forward
  const [finRootAx, finRootAy] = proj(0,  0.05, -0.55);  // root aft
  const [finTipx,   finTipy  ] = proj(0,  0.42, -0.38);  // tip (top)

  ctx.beginPath();
  ctx.moveTo(finRootFx, finRootFy);
  ctx.lineTo(finTipx,   finTipy);
  ctx.lineTo(finRootAx, finRootAy);
  ctx.closePath();
  ctx.fillStyle = FILL;
  ctx.fill();
  ctx.strokeStyle = GREEN;
  ctx.lineWidth = LINE;
  ctx.stroke();

  // Only meaningful at low aspect — shows as a glowing circle when dead 6
  const exhaustVis = Math.max(0, cosA); // fades away past 90°
  if (exhaustVis > 0.05) {
    // Project tail center
    const [tex, tey] = proj(0, -0.01, -fuseLen);
    const exhaustR = scale * 0.07 * exhaustVis;
    // Glow
    const grad = ctx.createRadialGradient(tex, tey, 0, tex, tey, exhaustR * 1.4);
    grad.addColorStop(0,   `rgba(255, 180, 40,  ${0.9 * exhaustVis})`);
    grad.addColorStop(0.5, `rgba(255,  60,  0,  ${0.5 * exhaustVis})`);
    grad.addColorStop(1,   'transparent');
    ctx.beginPath();
    ctx.arc(tex, tey, exhaustR * 1.4, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    // Rim
    ctx.beginPath();
    ctx.arc(tex, tey, exhaustR, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(0, 255, 136, ${exhaustVis * 0.9})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  ctx.restore();
}

function drawHUD(angle, pitch, heading) {
  const W = canvas.width / window.devicePixelRatio;
  const H = canvas.height / window.devicePixelRatio;

  ctx.clearRect(0, 0, W, H);

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.65);
  skyGrad.addColorStop(0, '#000d06');
  skyGrad.addColorStop(1, '#001508');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Ground
  const gGrad = ctx.createLinearGradient(0, H * 0.65, 0, H);
  gGrad.addColorStop(0, '#001008');
  gGrad.addColorStop(1, '#000a05');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0, H * 0.65, W, H * 0.35);

  // Horizon line
  ctx.beginPath();
  ctx.moveTo(0, H * 0.65);
  ctx.lineTo(W, H * 0.65);
  ctx.strokeStyle = '#00ff8844';
  ctx.lineWidth = 1;
  ctx.stroke();

  // HUD reticle lines
  ctx.strokeStyle = '#00ff8822';
  ctx.lineWidth = 0.5;
  // horizontal
  ctx.beginPath(); ctx.moveTo(W * 0.1, H * 0.5); ctx.lineTo(W * 0.38, H * 0.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W * 0.62, H * 0.5); ctx.lineTo(W * 0.9, H * 0.5); ctx.stroke();
  // vertical
  ctx.beginPath(); ctx.moveTo(W * 0.5, H * 0.1); ctx.lineTo(W * 0.5, H * 0.38); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W * 0.5, H * 0.62); ctx.lineTo(W * 0.5, H * 0.9); ctx.stroke();

  // Center dot
  ctx.beginPath();
  ctx.arc(W * 0.5, H * 0.5, 2, 0, Math.PI * 2);
  ctx.fillStyle = '#00ff8866';
  ctx.fill();

  // Altitude/speed bars (cosmetic)
  ctx.strokeStyle = '#00ff8833';
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const y = H * 0.3 + i * H * 0.1;
    ctx.beginPath(); ctx.moveTo(W * 0.05, y); ctx.lineTo(W * 0.12, y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W * 0.88, y); ctx.lineTo(W * 0.95, y); ctx.stroke();
  }

  const banditCX = W * 0.5;
  const banditCY = H * 0.42;
  const scale = Math.min(W, H) * 0.28;
  // heading 0=tail-on, 90=beam right, 180=head-on, 270=beam left
  // silhouette angle: 0=tail, 90=beam, 180=nose
  // side: heading 1-179 = bandit turned right = we see right side = 'R'
  //       heading 181-359 = bandit turned left = we see left side = 'L'
  drawBandit(banditCX, banditCY, currentAngle, side, scale, pitch);

  // Targeting box around bandit
  const boxSize = scale * 0.9;
  const bx = banditCX - boxSize;
  const by = banditCY - boxSize * 0.6;
  const bw = boxSize * 2;
  const bh = boxSize * 1.1;

  ctx.strokeStyle = '#00ff8844';
  ctx.lineWidth = 0.8;
  const cs = 10; // corner size
  [[bx,by],[bx+bw,by],[bx,by+bh],[bx+bw,by+bh]].forEach(([x,y],i) => {
    const sx = i%2===0?1:-1, sy = i<2?1:-1;
    ctx.beginPath();
    ctx.moveTo(x, y+sy*cs); ctx.lineTo(x,y); ctx.lineTo(x+sx*cs,y);
    ctx.stroke();
  });

  // Aspect angle arc indicator (small, bottom left)
  const arcCX = W * 0.14, arcCY = H * 0.78, arcR = H * 0.1;
  ctx.beginPath();
  ctx.arc(arcCX, arcCY, arcR, Math.PI, 0, false);
  ctx.strokeStyle = '#00ff8822';
  ctx.lineWidth = 1;
  ctx.stroke();

  // filled arc showing current angle
  const arcAngle = Math.PI - (angle / 180) * Math.PI;
  ctx.beginPath();
  ctx.moveTo(arcCX, arcCY);
  ctx.arc(arcCX, arcCY, arcR, Math.PI, arcAngle, false);
  ctx.closePath();
  ctx.fillStyle = '#00ff8818';
  ctx.fill();
  ctx.strokeStyle = '#00ff88aa';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Bandit dot on arc
  const dotAngle = Math.PI - (angle / 180) * Math.PI;
  const dotX = arcCX + arcR * Math.cos(dotAngle);
  const dotY = arcCY + arcR * Math.sin(dotAngle);
  ctx.beginPath();
  ctx.arc(dotX, dotY, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#00ff88';
  ctx.fill();

  ctx.fillStyle = '#00ff8888';
  ctx.font = '11px Share Tech Mono';
  ctx.fillText('AA', arcCX - 6, arcCY + arcR + 12);

  // Labels
  ctx.font = `12px "Share Tech Mono"`;
  ctx.fillStyle = '#00ff8866';
  ctx.fillText('0°', arcCX - arcR - 4, arcCY + 4);
  ctx.fillText('180°', arcCX + arcR - 4, arcCY + 4);

  // Angle readout overlay
  ctx.font = `bold 14px "Share Tech Mono"`;
  ctx.fillStyle = '#00ff88cc';
  ctx.fillText(`AA  ${fmt(angle)}${side}`, W * 0.05, H * 0.12);

  // Status
  const status = angle < 20 ? 'STERN  CONVERSION' :
                 angle < 60 ? 'LOW  ASPECT' :
                 angle < 120 ? 'BEAM  ASPECT' :
                 angle < 160 ? 'HIGH  ASPECT' : 'HEAD-ON  MERGE';
  ctx.fillStyle = '#00ff88aa';
  ctx.font = `13px "Share Tech Mono"`;
  ctx.fillText(status, W * 0.05, H * 0.26);

  updateInfo(angle);
}

function updateInfo(angle) {
  let text = '';
  if (angle <= 10) {
    text = `<span class="label">ZERO ASPECT (${fmt(angle)}${side})</span>`;
  } else if (angle <= 45) {
    text = `<span class="label">LOW ASPECT (${fmt(angle)}${side})</span>`;
  } else if (angle <= 75) {
    text = `<span class="label">MODERATE ASPECT (${fmt(angle)}${side})</span>`;
  } else if (angle <= 105) {
    text = `<span class="label">BEAM ASPECT (${fmt(angle)}${side})</span>`;
  } else if (angle <= 150) {
    text = `<span class="label">HIGH ASPECT (${fmt(angle)}${side})</span>`;
  } else {
    text = `<span class="label">HEAD-ON / MERGE (${fmt(angle)}${side})</span>`;
  }
  infoBox.innerHTML = text;
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
pitchSlider.style.setProperty('--pct', '50%');
myPosSlider.style.setProperty('--pct', '50%');
banditPosSlider.style.setProperty('--pct', '50%');

// Init compass dials
const banditDialEl = document.getElementById('banditDial');
const myDialEl     = document.getElementById('myDial');

makeDial(banditDialEl,
  () => banditHeading, v => { banditHeading = v; },
  document.getElementById('headingDisplay'), '#00ff88', true);

makeDial(myDialEl,
  () => myHeading, v => { myHeading = v; },
  document.getElementById('myHeadingDisplay'), '#44aaff', false);

drawDial(banditDialEl, banditHeading, '#00ff88');
drawDial(myDialEl,     myHeading,     '#44aaff');
computeAA();
draw();

function draw() {
  drawHUD(currentAngle, currentPitch, banditHeading);
  drawTopDown(currentAngle, side, myPos);
}
